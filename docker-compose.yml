services:
  auto-deploy:
    build: .
    image: auto-deploy-platform:latest
    container_name: auto-deploy-platform
    ports:
      - "8080:8080"
    volumes:
      # 配置文件挂载（可读写，支持动态修改）
      - ./config.yaml:/app/config.yaml
      # 数据持久化（SQLite 数据库）
      - deploy-data:/app/data
      # 代码工作目录持久化（避免每次重新克隆）
      - deploy-workspace:/app/workspace
    environment:
      - GIN_MODE=release
      - TZ=Asia/Shanghai
      - CONFIG_PATH=/app/config.yaml
      - DB_PATH=/app/data/deploy.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  deploy-data:
  deploy-workspace:
