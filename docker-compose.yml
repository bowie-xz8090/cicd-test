services:
  auto-deploy:
    build:
      context: .
      dockerfile: Dockerfile
    image: auto-deploy-platform:latest
    container_name: auto-deploy-platform
    ports:
      - "82:82"
    volumes:
      # 配置文件挂载（可读写，支持动态修改）
      - ./config.yaml:/app/config.yaml
      # 数据持久化（SQLite 数据库）
      - ./deploy-data:/app/data
      # 代码工作目录持久化（避免每次重新克隆）
      - ./deploy-workspace:/app/workspace
      # Maven 本地仓库持久化（避免每次重新下载依赖）
      - ./maven-repo:/root/.m2/repository
      # pnpm 缓存持久化
      - ./pnpm-store:/root/.local/share/pnpm/store
    environment:
      - GIN_MODE=release
      - TZ=Asia/Shanghai
      - CONFIG_PATH=/app/config.yaml
      - DB_PATH=/app/data/deploy.db
      - BASE_PATH=/
      - MAVEN_OPTS=-Xmx512m -XX:+UseParallelGC -Dmaven.repo.local=/root/.m2/repository
      - NODE_OPTIONS=--max-old-space-size=4096
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider \"http://localhost:82$${BASE_PATH:-}/api/health\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
