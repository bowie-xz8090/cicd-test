server:
  port: 8080
  workspace: "./workspace"
  title: "自动部署平台"

admin_token: "change-me-to-a-secure-random-string"
webhook_secret: "change-me-to-webhook-secret"

gitea:
  url: "http://gitea.example.com"
  username: "your-username"
  token: "your-access-token"

# 服务器集中定义，多个项目可以引用同一个 server key，避免重复配置
servers:
  dev-server-a:
    host: "192.168.1.10"
    port: 22
    user: "root"
    password: "your-ssh-password"
    deploy_path: "/root/temp"
  dev-server-b:
    host: "192.168.1.11"
    port: 22
    user: "root"
    password: "your-ssh-password"
    deploy_path: "/root/temp"
  sit-server:
    host: "192.168.1.20"
    port: 22
    user: "root"
    password: "your-ssh-password"
    deploy_path: "/root/temp"
  prod-server:
    host: "192.168.1.30"
    port: 22
    user: "root"
    password: "your-ssh-password"
    deploy_path: "/root/temp"

# environments 仅定义环境的显示信息（标签、链接）
environments:
  dev:
    label: "开发环境"
    disabled: false
    links:
      user_url: "http://dev.example.com"
      admin_url: "http://dev-admin.example.com"
  sit:
    label: "测试环境"
    disabled: false
    links:
      user_url: "http://sit.example.com"
      admin_url: "http://sit-admin.example.com"
  prod:
    label: "生产环境"
    disabled: true
    links:
      user_url: "http://prod.example.com"
      admin_url: "http://prod-admin.example.com"

projects:
  # 后端项目（无子项目），通过 server 字段引用 servers 中的 key
  my-backend:
    env_overrides:
      dev:
        build_cmd: "mvn clean package -DskipTests -Pdev"
        build_output: "./target/app.jar"
        rename_to: "app.jar"
        deploy_script: "docker cp /root/temp/app.jar my-server:/app/app.jar && docker restart my-server"
        server: "dev-server-a"
      sit:
        build_cmd: "mvn clean package -DskipTests -Psit"
        build_output: "./target/app.jar"
        rename_to: "app-latest.jar"
        deploy_script: "systemctl restart my-backend"
        server: "sit-server"
      prod:
        build_cmd: "mvn clean package -DskipTests -Pprod"
        build_output: "./target/app.jar"
        rename_to: "app.jar"
        deploy_script: "docker cp /root/temp/app.jar my-server:/app/app.jar && docker restart my-server"
        server: "prod-server"

  # 前端 monorepo（有子项目），每个子项目可以引用不同的 server
  my-frontend:
    sub_projects:
      user-ui:
        label: "用户端"
        env_overrides:
          dev:
            build_cmd: "pnpm install && pnpm build:dev --filter user-ui"
            artifacts:
              - build_output: "./apps/user-ui/dist"
                rename_to: "user-ui.tar.gz"
                deploy_script: "tar -xzf /root/temp/user-ui.tar.gz -C /tmp && docker cp /tmp/dist/. nginx:/usr/share/nginx/html/ && rm -rf /tmp/dist && docker restart nginx"
            server: "dev-server-a"
          sit:
            build_cmd: "pnpm install && pnpm build:sit --filter user-ui"
            artifacts:
              - build_output: "./apps/user-ui/dist"
                rename_to: "user-ui.tar.gz"
                deploy_script: "nginx -s reload"
            server: "sit-server"
          prod:
            build_cmd: "pnpm install && pnpm build:prod --filter user-ui"
            artifacts:
              - build_output: "./apps/user-ui/dist"
                rename_to: "user-ui.tar.gz"
                deploy_script: "docker restart nginx"
            server: "prod-server"

      admin-ui:
        label: "管理端"
        env_overrides:
          dev:
            build_cmd: "pnpm install && pnpm build:dev --filter admin-ui"
            artifacts:
              - build_output: "./apps/admin-ui/dist"
                rename_to: "admin-ui.tar.gz"
                deploy_script: "docker restart nginx-admin"
            server: "dev-server-b"
          sit:
            build_cmd: "pnpm install && pnpm build:sit --filter admin-ui"
            artifacts:
              - build_output: "./apps/admin-ui/dist"
                rename_to: "admin-ui.tar.gz"
                deploy_script: "nginx -s reload"
            server: "sit-server"
          prod:
            build_cmd: "pnpm install && pnpm build:prod --filter admin-ui"
            artifacts:
              - build_output: "./apps/admin-ui/dist"
                rename_to: "admin-ui.tar.gz"
                deploy_script: "docker restart nginx-admin"
            server: "prod-server"

    # 全部部署时的配置
    env_overrides:
      dev:
        build_cmd: "pnpm install && pnpm build:dev"
        artifacts:
          - build_output: "./apps/user-ui/dist"
            rename_to: "user-ui.tar.gz"
            deploy_script: "docker restart nginx"
          - build_output: "./apps/admin-ui/dist"
            rename_to: "admin-ui.tar.gz"
            deploy_script: "docker restart nginx-admin"
        server: "dev-server-a"
      sit:
        build_cmd: "pnpm install && pnpm build:sit"
        artifacts:
          - build_output: "./apps/user-ui/dist"
            rename_to: "user-ui.tar.gz"
            deploy_script: "nginx -s reload"
          - build_output: "./apps/admin-ui/dist"
            rename_to: "admin-ui.tar.gz"
            deploy_script: "nginx -s reload"
        server: "sit-server"
      prod:
        build_cmd: "pnpm install && pnpm build:prod"
        artifacts:
          - build_output: "./apps/user-ui/dist"
            rename_to: "user-ui.tar.gz"
            deploy_script: "docker restart nginx"
          - build_output: "./apps/admin-ui/dist"
            rename_to: "admin-ui.tar.gz"
            deploy_script: "docker restart nginx-admin"
        server: "prod-server"
